<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Donation Goal</title>
  <link rel="stylesheet" href="/css/goal.css">
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <div class="goal-container" id="goal-container">
    
    <!-- Main content -->
    <div class="goal-body">
      <div class="goal-info">
        <span class="goal-label">DONATION GOAL</span>
        <div class="goal-title" id="goal-title">Loading...</div>
        <div class="goal-amounts">
          <span id="goal-current">Rp 0</span>
          <span id="goal-target">Rp 0</span>
        </div>
      </div>

      <!-- Right: Percentage Badge -->
      <div class="goal-badge">
        <span id="goal-percentage">0%</span>
      </div>
    </div>

    <!-- Bottom progress bar -->
    <div class="goal-bar-track">
      <div class="goal-bar-fill" id="goal-bar-fill" style="width: 0%;"></div>
    </div>

  </div>
  <script src="/js/goal/main.js"></script>
</body>
</html>
