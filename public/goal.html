<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Donation Goal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="css/goal.css" rel="stylesheet">
</head>
<body>
  <div class="goal-container" id="goal-container">

    <div class="goal-row-top">
      <span class="goal-title" id="goal-title">Loading...</span>
      <span class="goal-pct"   id="goal-pct">0%</span>
    </div>

    <div class="goal-amount-row">
      <span class="goal-current" id="goal-current">Rp 0</span>
      <span class="goal-sep">/</span>
      <span class="goal-target"  id="goal-target">Rp 0</span>
    </div>

    <!-- Bar sits flush at bottom of card -->
    <div class="goal-bar-track">
      <div class="goal-bar-fill" id="goal-bar-fill"></div>
    </div>

  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script type="module" src="js/goal/main.js"></script>
</body>
</html>
