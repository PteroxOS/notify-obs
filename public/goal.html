<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Donation Goal</title>
  <link rel="stylesheet" href="/css/goal.css">
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <div class="goal-container" id="goal-container">

    <!-- Top row: scoreboard header -->
    <div class="goal-header">
      <div class="goal-header-title">
        <span class="goal-label">DONATION GOAL</span>
        <span class="goal-title" id="goal-title">Loading...</span>
      </div>
      <div class="goal-header-pct">
        <span class="goal-pct" id="goal-percentage">0%</span>
      </div>
    </div>

    <!-- Bottom row: amounts + bar -->
    <div class="goal-footer">
      <div class="goal-amounts">
        <span id="goal-current">Rp 0</span>
        <span class="goal-divider-dot">·</span>
        <span id="goal-target">Rp 0</span>
      </div>
      <div class="goal-bar-track">
        <div class="goal-bar-fill" id="goal-bar-fill" style="width: 0%;"></div>
      </div>
    </div>

  </div>
  <script src="/js/goal/main.js"></script>
</body>
</html>
