<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Donation Goal Widget</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
  <link href="css/goal.css" rel="stylesheet" />
</head>
<body>
  <div class="goal-container">
    <div class="goal-title" id="goal-title">Loading Goal...</div>
    <div class="goal-bar-bg">
      <div class="goal-bar-fill" id="goal-bar-fill" style="width: 0%;"></div>
    </div>
    <div class="goal-amounts">
      <span id="goal-current">Rp 0</span> / <span id="goal-target">Rp 0</span>
    </div>
    <div class="goal-percentage" id="goal-percentage">0%</div>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script type="module" src="js/goal/main.js"></script>
</body>
</html>
